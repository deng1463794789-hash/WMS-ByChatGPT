server:
  port: ${WMS_SERVER_PORT:8080}

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${WMS_DB_HOST}:${WMS_DB_PORT:3306}/${WMS_DB_NAME}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${WMS_DB_USERNAME}
    password: ${WMS_DB_PASSWORD}
  data:
    redis:
      host: ${WMS_REDIS_HOST}
      port: ${WMS_REDIS_PORT:6379}
      database: ${WMS_REDIS_DATABASE:0}
      password: ${WMS_REDIS_PASSWORD:}
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
